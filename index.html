<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OS Dispute Generator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%238b5cf6'/><path d='M30 50 L44 64 L70 36' stroke='white' stroke-width='9' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --border: #2a3a55;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #10b981;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 40px 20px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.06) 0%, transparent 50%);
  }
  .container { max-width: 760px; margin: 0 auto; }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.6s ease;
  }
  .header-icon {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: linear-gradient(135deg, #1e2d4a, #2a3a55);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 28px;
    box-shadow: 0 4px 24px rgba(0,212,255,0.12);
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .header p {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    background: rgba(0,212,255,0.07);
    border: 1px solid rgba(0,212,255,0.25);
    border-radius: 100px;
    padding: 7px 20px;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--accent);
    letter-spacing: 1.5px;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.4s infinite;
    flex-shrink: 0;
  }
  @keyframes blink {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.3; transform:scale(0.75); }
  }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 18px;
    animation: fadeUp 0.6s ease;
  }
  .card-title {
    font-size: 0.68rem;
    font-family: var(--mono);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    width: 18px; height: 2px;
    background: var(--accent);
    display: inline-block;
  }

  /* INPUT */
  .input-row { display: flex; gap: 12px; align-items: flex-end; }
  .field { flex: 1; }
  label {
    display: block;
    font-size: 0.72rem;
    font-family: var(--mono);
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
  }
  .filename-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 16px;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--accent);
    margin-top: 14px;
    word-break: break-all;
    min-height: 46px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .filename-display .ph { opacity: 0.35; font-size: 0.72rem; }

  .btn-download {
    background: linear-gradient(135deg, var(--accent2), #4f46e5);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 22px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 0.88rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }
  .btn-download:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-download:active { transform: translateY(0); }
  .btn-download:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 10px;
    text-align: center;
  }
  .stat-val {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--accent);
    display: block;
    font-family: var(--mono);
  }
  .stat-label {
    font-size: 0.62rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: var(--mono);
    margin-top: 3px;
  }

  /* WIKI */
  .wiki-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .wiki-header .card-title { margin-bottom: 0; }
  .wiki-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    font-family: var(--mono);
    font-size: 0.81rem;
    line-height: 2;
    white-space: pre-wrap;
    color: #c8d6e8;
    user-select: all;
  }
  .btn-copy {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn-copy:hover { border-color: var(--success); color: var(--success); }
  .btn-copy.copied { border-color: var(--success); color: var(--success); }

  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-14px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon">🛡️</div>
    <h1>OS Dispute Generator</h1>
    <p>Cebu Review · CP P2 2026</p>
    <div class="live-badge">
      <span class="live-dot"></span>
      <span id="liveDateLabel">Loading date...</span>
    </div>
  </div>

  <!-- File Generator -->
  <div class="card">
    <div class="card-title">File Configuration</div>
    <div class="input-row">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="nameInput" placeholder="e.g. Diovic" oninput="update()">
      </div>
      <button class="btn-download" id="dlBtn" onclick="downloadFile()" disabled>⬇ Download</button>
    </div>
    <div class="filename-display" id="filenameDisplay">
      <span class="ph">→ Enter your name to generate filename</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="card">
    <div class="card-title">File Statistics</div>
    <div class="stats-grid">
      <div class="stat"><span class="stat-val">50</span><div class="stat-label">Total URLs</div></div>
      <div class="stat"><span class="stat-val">50/50</span><div class="stat-label">Categorized</div></div>
      <div class="stat"><span class="stat-val">0</span><div class="stat-label">Duplicates</div></div>
      <div class="stat"><span class="stat-val">50/50</span><div class="stat-label">Uploaded GD</div></div>
    </div>
  </div>

  <!-- Wiki -->
  <div class="card">
    <div class="wiki-header">
      <div class="card-title">WIKI Message</div>
      <button class="btn-copy" id="copyBtn" onclick="copyWiki()">COPY</button>
    </div>
    <div class="wiki-box" id="wikiBox"></div>
  </div>

</div>

const TOTAL = 50, CATEGORIZED = 50, DUPLICATES = 0, UPLOADED = 50, IMMUTABLE = 50;

function getDateStr() {
  const d = new Date();
  const day = String(d.getDate()).padStart(2,'0');
  const mon = String(d.getMonth()+1).padStart(2,'0');
  const yr  = d.getFullYear();
  return day + mon + yr;
}

function getReadableDate() {
  const d = new Date();
  return d.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

function getYear() { return new Date().getFullYear(); }

function update() {
  const name    = document.getElementById('nameInput').value.trim();
  const dateStr = getDateStr();
  const year    = getYear();
  const dlBtn   = document.getElementById('dlBtn');
  const display = document.getElementById('filenameDisplay');

  if (name) {
    const fname = `cebu_review_${dateStr}_CP_P2_${year}_${name}`;
    display.innerHTML = `<span>→</span> ${fname}.xlsx`;
    dlBtn.disabled = false;
  } else {
    display.innerHTML = '<span class="ph">→ Enter your name to generate filename</span>';
    dlBtn.disabled = true;
  }
  updateWiki();
}

function updateWiki() {
  const dateStr = getDateStr();
  const year    = getYear();
  const fname   = `cebu_review_${dateStr}_CP_P2_${year}`;

  const msg =
`Hi Chisato-san,

Done uploading/updating on GD the data from disputes CP P2 ${year} file (${TOTAL} URLs). Thank you.

File: ${fname}
Total: ${TOTAL} URLs
Categorized: ${CATEGORIZED}/${TOTAL}
Duplicate: ${DUPLICATES}
Uploaded on GD: ${UPLOADED}/${TOTAL}
Comment: Disputes Priority 2 Checkpoint accepted at ${year}

「The same category as the secondary」None
「The URL already has the same categories with the same order」None
「Tagged as Immutable」${IMMUTABLE} URLs
「Security category」 None`;

  document.getElementById('wikiBox').textContent = msg;
}

function updateLiveDate() {
  document.getElementById('liveDateLabel').textContent = getReadableDate();
}

function downloadFile() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  const fname = `cebu_review_${getDateStr()}_CP_P2_${getYear()}_${name}.xlsx`;
  const binary = atob(TEMPLATE_B64);
  const bytes  = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
}

function copyWiki() {
  const text = document.getElementById('wikiBox').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'COPIED ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2000);
  });
}

// Init + keep date live
updateLiveDate();
updateWiki();
setInterval(() => {
  updateLiveDate();
  updateWiki();
  update();
}, 60000); // refresh every minute (catches midnight date change)
</script>
