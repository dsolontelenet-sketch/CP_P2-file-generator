<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OS Dispute Generator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%238b5cf6'/><path d='M30 50 L44 64 L70 36' stroke='white' stroke-width='9' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --border: #2a3a55;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #10b981;
    --warn: #f59e0b;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 40px 20px 60px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.06) 0%, transparent 50%);
  }
  .container { max-width: 760px; margin: 0 auto; }

  /* HEADER */
  .header { text-align: center; margin-bottom: 36px; animation: fadeDown 0.6s ease; }
  .header-icon {
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, #1e2d4a, #2a3a55);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px; font-size: 28px;
    box-shadow: 0 4px 24px rgba(0,212,255,0.12);
  }
  .header h1 {
    font-size: 2rem; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 6px;
  }
  .header p { color: var(--muted); font-family: var(--mono); font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; }
  .live-badge {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 14px;
    background: rgba(0,212,255,0.07); border: 1px solid rgba(0,212,255,0.25);
    border-radius: 100px; padding: 7px 20px;
    font-family: var(--mono); font-size: 0.78rem; color: var(--accent); letter-spacing: 1.5px;
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: blink 1.4s infinite; flex-shrink: 0; }
  @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.75)} }

  /* CARD */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; margin-bottom: 18px;
    animation: fadeUp 0.6s ease;
  }
  .card-title {
    font-size: 0.68rem; font-family: var(--mono); letter-spacing: 3px;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .card-title::before { content: ''; width: 18px; height: 2px; background: var(--accent); display: inline-block; }

  /* LABELS & INPUTS */
  label {
    display: block; font-size: 0.7rem; font-family: var(--mono);
    color: var(--muted); margin-bottom: 7px; letter-spacing: 1px; text-transform: uppercase;
  }
  label .hint { color: rgba(100,116,139,0.5); font-size: 0.62rem; margin-left: 4px; }
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }

  input[type="text"], input[type="number"] {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; color: var(--text);
    font-family: var(--sans); font-size: 0.95rem; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }

  textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; color: var(--text);
    font-family: var(--mono); font-size: 0.8rem; outline: none;
    resize: vertical; min-height: 200px; line-height: 1.75;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
  textarea::placeholder { color: var(--muted); }

  /* URL COUNT */
  .url-count {
    margin-top: 9px; font-family: var(--mono); font-size: 0.72rem;
    color: var(--muted); transition: color 0.2s;
  }
  .url-count.has-urls { color: var(--accent); }

  /* FILENAME PREVIEW */
  .filename-preview {
    margin-top: 14px; padding: 12px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; font-family: var(--mono); font-size: 0.8rem;
    color: var(--muted); word-break: break-all;
    min-height: 44px; display: flex; align-items: center; gap: 8px;
    transition: border-color 0.3s, color 0.3s;
  }
  .filename-preview.ready { border-color: rgba(16,185,129,0.35); color: var(--success); }

  /* DOWNLOAD BUTTON */
  .btn-dl {
    width: 100%; margin-top: 14px; padding: 14px 20px;
    background: linear-gradient(135deg, var(--accent2), #4f46e5);
    color: #fff; border: none; border-radius: 10px;
    font-family: var(--mono); font-weight: 700; font-size: 0.88rem;
    letter-spacing: 1px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all 0.2s;
  }
  .btn-dl:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,58,237,0.4); }
  .btn-dl:active { transform: translateY(0); }
  .btn-dl:disabled { opacity: 0.28; cursor: not-allowed; transform: none; box-shadow: none; }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }

  /* STATS GRID */
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 8px; text-align: center;
  }
  .stat.auto { border-color: rgba(0,212,255,0.2); }
  .stat-val {
    font-size: 1.4rem; font-weight: 800; color: var(--accent);
    display: block; font-family: var(--mono); line-height: 1.2;
    transition: all 0.2s;
  }
  .stat-val.warn { color: var(--warn); }
  .stat-label { font-size: 0.58rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-family: var(--mono); margin-top: 5px; }
  .stat-badge { font-size: 0.52rem; color: rgba(0,212,255,0.5); font-family: var(--mono); letter-spacing: 0.5px; margin-top: 3px; }

  /* MANUAL FIELDS */
  .manual-title {
    font-size: 0.63rem; font-family: var(--mono); letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 14px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

  /* WIKI */
  .wiki-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .wiki-header .card-title { margin-bottom: 0; }
  .wiki-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px; font-family: var(--mono); font-size: 0.8rem;
    line-height: 2; white-space: pre-wrap; color: #c8d6e8; user-select: all;
  }
  .btn-copy {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 7px 16px; font-family: var(--mono);
    font-size: 0.7rem; cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
  }
  .btn-copy:hover { border-color: var(--success); color: var(--success); }
  .btn-copy.copied { border-color: var(--success); color: var(--success); }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(14px)}  to{opacity:1;transform:translateY(0)} }

  @media(max-width:580px) {
    .stats-grid  { grid-template-columns: 1fr 1fr; }
    .three-col   { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-icon">🛡️</div>
    <h1>OS Dispute Generator</h1>
    <p>Cebu Review · CP P2 2026</p>
    <div class="live-badge">
      <span class="live-dot"></span>
      <span id="liveDateLabel">Loading...</span>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       CARD 1 · FILE CONFIGURATION
  ════════════════════════════════════════ -->
  <div class="card">
    <div class="card-title">File Configuration</div>

    <!-- Name -->
    <div class="field">
      <label>Your Name <span class="hint">— used in filename</span></label>
      <input type="text" id="nameInput" placeholder="e.g. Diovic" oninput="onUpdate()">
    </div>

    <!-- Bulk URLs -->
    <div class="field">
      <label>Bulk URL Input <span class="hint">— one per line · http/https &amp; :80/:443 auto-removed</span></label>
      <textarea id="urlInput"
        placeholder="Paste your URLs here, one per line:&#10;&#10;http://google.com/&#10;https://facebook.com:443/&#10;example.org&#10;malicious-site.net:80"
        oninput="onUpdate()"></textarea>
      <div class="url-count" id="urlCount">0 URLs detected</div>
    </div>

    <!-- Filename preview -->
    <div class="filename-preview" id="filenamePreview">
      → Enter your name and paste URLs to preview filename
    </div>

    <!-- Download -->
    <button class="btn-dl" id="dlBtn" onclick="downloadFile()" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download Excel File
    </button>
  </div>

  <!-- ══════════════════════════════════════
       CARD 2 · FILE STATISTICS
  ════════════════════════════════════════ -->
  <div class="card">
    <div class="card-title">File Statistics</div>

    <!-- Auto stats -->
    <div class="stats-grid">
      <div class="stat auto">
        <span class="stat-val" id="statTotal">0</span>
        <div class="stat-label">Total URLs</div>
        <div class="stat-badge">AUTO</div>
      </div>
      <div class="stat auto">
        <span class="stat-val" id="statCat">0/0</span>
        <div class="stat-label">Categorized</div>
        <div class="stat-badge">AUTO</div>
      </div>
      <div class="stat">
        <span class="stat-val warn" id="statDup">0</span>
        <div class="stat-label">Duplicates</div>
        <div class="stat-badge">MANUAL</div>
      </div>
      <div class="stat auto">
        <span class="stat-val" id="statUpload">0/0</span>
        <div class="stat-label">Uploaded GD</div>
        <div class="stat-badge">AUTO</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Manual input fields -->
    <div class="manual-title">Manual Fields</div>
    <div class="three-col">
      <div class="field">
        <label>Duplicates <span class="hint">subtracts from Uploaded</span></label>
        <input type="number" id="dupInput" value="0" min="0" placeholder="0" oninput="onUpdate()">
      </div>
      <div class="field">
        <label>Tagged as Immutable</label>
        <input type="number" id="immutableInput" value="0" min="0" placeholder="0" oninput="onUpdate()">
      </div>
      <div class="field">
        <label>Security Category</label>
        <input type="text" id="secCatInput" placeholder="None" oninput="onUpdate()">
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       CARD 3 · WIKI MESSAGE
  ════════════════════════════════════════ -->
  <div class="card">
    <div class="wiki-header">
      <div class="card-title">WIKI Message</div>
      <button class="btn-copy" id="copyBtn" onclick="copyWiki()">COPY</button>
    </div>
    <div class="wiki-box" id="wikiBox">—</div>
  </div>

</div>

<script>
/* ──────────────────────────────────────────
   HELPERS
────────────────────────────────────────── */
function getDateStr() {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0')
       + String(d.getMonth()+1).padStart(2,'0')
       + d.getFullYear();
}
function getReadableDate() {
  return new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function getYear() { return new Date().getFullYear(); }

function cleanUrl(raw) {
  let u = raw.trim();
  if (!u) return '';
  u = u.replace(/^https?:\/\//i, '');        // remove http:// https://
  u = u.replace(/:(?:80|443)(\/|$)/, '$1'); // remove :80 :443
  u = u.replace(/\/$/, '');                 // remove trailing slash
  return u.trim();
}

function getUrls() {
  return document.getElementById('urlInput').value
    .split('\n')
    .map(l => cleanUrl(l))
    .filter(l => l.length > 0);
}

function buildFilename(name) {
  return `cebu_review_${getDateStr()}_CP_P2_${getYear()}_${name}`;
}

/* ──────────────────────────────────────────
   MASTER UPDATE
────────────────────────────────────────── */
function onUpdate() {
  const name   = document.getElementById('nameInput').value.trim();
  const urls   = getUrls();
  const total  = urls.length;
  const dup    = Math.max(0, Math.min(parseInt(document.getElementById('dupInput').value) || 0, total));
  const upload = Math.max(0, total - dup);

  /* URL count label */
  const countEl = document.getElementById('urlCount');
  if (total > 0) {
    countEl.textContent = `✓ ${total} URL${total !== 1 ? 's' : ''} detected`;
    countEl.classList.add('has-urls');
  } else {
    countEl.textContent = '0 URLs detected';
    countEl.classList.remove('has-urls');
  }

  /* Filename preview */
  const prev = document.getElementById('filenamePreview');
  if (name && total > 0) {
    prev.textContent = `→ ${buildFilename(name)}.xlsx`;
    prev.classList.add('ready');
  } else if (name) {
    prev.textContent = `→ ${buildFilename(name)}.xlsx  ·  paste URLs to enable download`;
    prev.classList.remove('ready');
  } else {
    prev.textContent = '→ Enter your name and paste URLs to preview filename';
    prev.classList.remove('ready');
  }

  /* Download button */
  document.getElementById('dlBtn').disabled = !(name && total > 0);

  /* Stats */
  document.getElementById('statTotal').textContent  = total;
  document.getElementById('statCat').textContent    = `${total}/${total}`;
  document.getElementById('statDup').textContent    = dup;
  document.getElementById('statUpload').textContent = `${upload}/${total}`;

  /* Wiki */
  buildWiki(total, dup, upload);
}

/* ──────────────────────────────────────────
   WIKI
────────────────────────────────────────── */
function buildWiki(total, dup, upload) {
  const year   = getYear();
  const dateStr = getDateStr();
  const imm    = parseInt(document.getElementById('immutableInput').value) || 0;
  const secRaw = document.getElementById('secCatInput').value.trim();
  const sec    = secRaw || 'None';
  const fname  = `cebu_review_${dateStr}_CP_P2_${year}`;

  document.getElementById('wikiBox').textContent =
`Hi Chisato-san,

Done uploading/updating on GD the data from disputes CP P2 ${year} file (${total} URLs). Thank you.

File: ${fname}
Total: ${total} URLs
Categorized: ${total}/${total}
Duplicate: ${dup}
Uploaded on GD: ${upload}/${total}
Comment: Disputes Priority 2 Checkpoint accepted at ${year}

「The same category as the secondary」None
「The URL already has the same categories with the same order」None
「Tagged as Immutable」${imm > 0 ? imm + ' URLs' : 'None'}
「Security category」${sec > 0 ? sec + ' URLs' : 'None'}`;
}

/* ──────────────────────────────────────────
   DOWNLOAD EXCEL
────────────────────────────────────────── */
function downloadFile() {
  const name = document.getElementById('nameInput').value.trim();
  const urls = getUrls();
  if (!name || !urls.length) return;

  const EXCL = 'UCReviewed,CLReviewed,CLRetain,HTTPError,IWCC,InTheClear,Uncategorized,UnknownHost,Undeliverable,Deleted,StDnsError,NRD,DLCSkip';

  const wb = XLSX.utils.book_new();
  const wsData = urls.map(url => [
    url,   // A — cleaned URL
    null,  // B — empty
    null,  // C — empty
    99999, // D
    'Immutable', // E
    EXCL   // F
  ]);

  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [
    { wch: 55 }, // A
    { wch: 4  }, // B
    { wch: 4  }, // C
    { wch: 8  }, // D
    { wch: 12 }, // E
    { wch: 100}  // F
  ];

  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, buildFilename(name) + '.xlsx');
}

/* ──────────────────────────────────────────
   COPY WIKI
────────────────────────────────────────── */
function copyWiki() {
  navigator.clipboard.writeText(document.getElementById('wikiBox').textContent).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'COPIED ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2000);
  });
}

/* ──────────────────────────────────────────
   INIT
────────────────────────────────────────── */
document.getElementById('liveDateLabel').textContent = getReadableDate();
onUpdate();
setInterval(() => { document.getElementById('liveDateLabel').textContent = getReadableDate(); }, 60000);
</script>
</body>
</html>
